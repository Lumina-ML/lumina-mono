services:
  postgres:
    image: postgres:15-alpine
    container_name: lumina-postgres
    environment:
      POSTGRES_USER: lumina
      POSTGRES_PASSWORD: lumina
      POSTGRES_DB: lumina
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumina -d lumina"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: lumina-server
    environment:
      NODE_ENV: production
      PORT: 8000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://lumina:lumina@postgres:5432/lumina?schema=public
      LOG_LEVEL: info
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    container_name: lumina-dashboard
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  postgres_data:
